name: Release

permissions: read-all

on:
  pull_request:
    branches: [ "master" ]
    types: [closed]

concurrency:
  group: release-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Resolve successful PR build run
        id: resolve-run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'BuildAndTests.yml';
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForWorkflow, {
              owner,
              repo,
              workflow_id,
              event: 'pull_request',
              per_page: 100
            });

            const run = runs.find(r =>
              r.head_sha === headSha &&
              r.conclusion === 'success' &&
              Array.isArray(r.pull_requests) &&
              r.pull_requests.some(pr => pr.number === prNumber)
            );

            if (!run) {
              core.setFailed(`No successful 'MR build and tests' run found for PR #${prNumber} and head SHA ${headSha}.`);
              return;
            }

            core.info(`Using workflow run id ${run.id} for artifact download.`);
            core.setOutput('run_id', String(run.id));

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-publish
          path: ./release-publish
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.resolve-run.outputs.run_id }}

      - name: Replace values on appsettings.json
        shell: bash
        env:
          TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          ENDPOINT: ${{ secrets.BETTERSTACK_ENDPOINT }}
        run: |
          FILE="${{ github.workspace }}/release-publish/appsettings.json"
          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi
      
          sed -i -E "s|\"sourceToken\"\s*:\s*\"[^\"]*\"|\"sourceToken\": \"${TOKEN}\"|" "$FILE"
          sed -i -E "s|\"betterStackEndpoint\"\s*:\s*\"[^\"]*\"|\"betterStackEndpoint\": \"${ENDPOINT}\"|" "$FILE"
          
      - name: Deploy
        uses: ChristopheLav/iis-deploy@v1
        with:
          website-name: 'felipesoares-001-site2'
          msdeploy-service-url: ${{ secrets.FTP_SERVER }}
          msdeploy-username: ${{ secrets.FTP_USERNAME }}
          msdeploy-password: ${{ secrets.FTP_PASSWORD }}
          source-path: ${{ github.workspace }}\release-publish\
          skip-extra-files: 0
