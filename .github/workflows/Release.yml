name: Release

permissions: read-all

on:
  push:
    branches: [ "master" ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: build + deploy ────────────────────────────────────────────────
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: ./easyfinance.client/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Publish
        run: dotnet publish EasyFinance.Server/EasyFinance.Server.csproj --configuration Release -p:IncludeSpaProject=true

      - name: Archive publish files
        uses: actions/upload-artifact@v7
        with:
          name: publish
          path: ./EasyFinance.Server/bin/Release/net8.0/publish/
          retention-days: 5

      - name: Replace values on appsettings.json
        shell: bash
        env:
          TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          ENDPOINT: ${{ secrets.BETTERSTACK_ENDPOINT }}
        run: |
          FILE="${{ github.workspace }}/EasyFinance.Server/bin/Release/net8.0/publish/appsettings.json"
          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi

          sed -i -E "s|\"sourceToken\"\s*:\s*\"[^\"]*\"|\"sourceToken\": \"${TOKEN}\"|" "$FILE"
          sed -i -E "s|\"betterStackEndpoint\"\s*:\s*\"[^\"]*\"|\"betterStackEndpoint\": \"${ENDPOINT}\"|" "$FILE"

      - name: Deploy
        uses: ChristopheLav/iis-deploy@v1
        with:
          website-name: 'felipesoares-001-site2'
          msdeploy-service-url: ${{ secrets.FTP_SERVER }}
          msdeploy-username: ${{ secrets.FTP_USERNAME }}
          msdeploy-password: ${{ secrets.FTP_PASSWORD }}
          source-path: ${{ github.workspace }}\EasyFinance.Server\bin\Release\net8.0\publish\
          skip-extra-files: 0

  # ── Mobile: standalone APK ─────────────────────────────────────────────────
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v7

    - name: Detect mobile changes
      id: mobile-changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          mobile:
            - 'econoflow-mobile/**'

    - name: Install Node.js
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'

    - name: Setup Java 17
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache mobile node_modules
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/cache@v6
      with:
        path: ./econoflow-mobile/node_modules
        key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('./econoflow-mobile/package-lock.json') }}

    - name: Install mobile dependencies
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npm ci
      working-directory: ./econoflow-mobile

    - name: Generate Android native project
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npx expo prebuild --platform android --no-install --clean
      working-directory: ./econoflow-mobile

    - name: Cache Gradle
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/cache@v6
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('econoflow-mobile/android/**/*.gradle*', 'econoflow-mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Generate signing keystore
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: |
        mkdir -p "$HOME/.android"
        keytool -genkey -v \
          -keystore "$HOME/.android/release.keystore" \
          -storepass android \
          -alias econoflow \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=EconoFlow,O=EconoFlow,C=PT"

    - name: Build standalone release APK
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="$HOME/.android/release.keystore" \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=econoflow \
          -Pandroid.injected.signing.key.password=android \
          --no-daemon
      working-directory: ./econoflow-mobile/android
      env:
        EXPO_PUBLIC_API_URL: https://econoflow.pt
        # The Sentry DSN is a public ingest endpoint, not a secret — it is
        # intentionally baked into the JS bundle by Metro at build time.
        EXPO_PUBLIC_SENTRY_DSN: https://e3e5bdde0b6e300e13e77f760e0c1cdf@o4511512006754304.ingest.de.sentry.io/4511512010096720
        # Auth token for uploading source maps so Sentry shows real file/line
        # numbers in crash reports. Add SENTRY_AUTH_TOKEN as a GitHub secret:
        # repo Settings → Secrets → Actions → New repository secret
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    - name: Upload release APK
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: android-release-apk
        path: ./econoflow-mobile/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
