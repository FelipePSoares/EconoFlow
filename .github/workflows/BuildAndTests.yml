# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: MR build and tests

on:
  pull_request:
    branches: [ "master" ]

concurrency:
  group: mr-build-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  checks: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'

    - name: Detect frontend changes in PR
      id: changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          client:
            - 'easyfinance.client/src/**'
          version_files:
            - 'easyfinance.client/src/assets/version.json'
            - 'easyfinance.client/src/app/core/utils/loaders/translate-http-loader.ts'

    - name: Auto bump frontend version for PR changes
      if: >
        steps.changes.outputs.client == 'true' &&
        steps.changes.outputs.version_files != 'true' &&
        github.actor != 'github-actions[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository
      shell: bash
      run: |
        VERSION_FILE="easyfinance.client/src/assets/version.json"

        CURRENT_VERSION=$(node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(v.versionNumber);" "$VERSION_FILE")

        BASE_VERSION=$(git show origin/${{ github.base_ref }}:"${VERSION_FILE}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).versionNumber));")
        if [ "$CURRENT_VERSION" != "$BASE_VERSION" ]; then
          echo "Version already bumped to $CURRENT_VERSION (base: $BASE_VERSION). Skipping."
          exit 0
        fi

        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

        node -e "
          const fs = require('fs');
          const versionFile = process.argv[1];
          const nextVersion = process.argv[2];
          const json = JSON.parse(fs.readFileSync(versionFile, 'utf8'));
          json.versionNumber = nextVersion;
          fs.writeFileSync(versionFile, JSON.stringify(json, null, 2) + '\n');
        " "$VERSION_FILE" "$NEXT_VERSION"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$VERSION_FILE"

        if git diff --cached --quiet; then
          echo "Version files already up to date."
          exit 0
        fi

        git commit -m "chore(ci): bump frontend version to ${NEXT_VERSION}"
        git push origin "HEAD:${{ github.head_ref }}"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Cache node_modules
      id: cache-node-modules-build
      uses: actions/cache@v6
      with:
        path: ./easyfinance.client/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('./easyfinance.client/package-lock.json') }}
            
    - name: Cache Cypress binary
      uses: actions/cache@v6
      with:
        path: ~/.cache/Cypress
        key: cypress-${{ runner.os }}-${{ hashFiles('./easyfinance.client/package-lock.json') }}

    - name: Restore dependencies
      run: dotnet restore EasyFinance.Server/EasyFinance.Server.csproj

    - name: Check code formatting
      run: dotnet format EasyFinance.Server/EasyFinance.Server.csproj --verify-no-changes --no-restore

    - name: Check for vulnerable NuGet packages
      run: dotnet list EasyFinance.Server/EasyFinance.Server.csproj package --vulnerable --include-transitive

    - name: Build backend application
      run: dotnet build EasyFinance.Server/EasyFinance.Server.csproj --configuration Debug --no-restore

    - name: Restore test projects
      run: |
        dotnet restore EasyFinance.Domain.Tests/EasyFinance.Domain.Tests.csproj
        dotnet restore EasyFinance.Application.Tests/EasyFinance.Application.Tests.csproj
        dotnet restore EasyFinance.Server.Tests/EasyFinance.Server.Tests.csproj

    - name: Build test projects
      run: |
        dotnet build EasyFinance.Domain.Tests/EasyFinance.Domain.Tests.csproj --configuration Debug --no-restore
        dotnet build EasyFinance.Application.Tests/EasyFinance.Application.Tests.csproj --configuration Debug --no-restore
        dotnet build EasyFinance.Server.Tests/EasyFinance.Server.Tests.csproj --configuration Debug --no-restore

    - name: Upload backend build outputs
      uses: actions/upload-artifact@v7
      with:
        name: backend-build-debug
        path: |
          EasyFinance*/bin/Debug/**
          EasyFinance*/obj/**
        retention-days: 1

    - name: Install dependencies
      if: steps.cache-node-modules-build.outputs.cache-hit != 'true'
      run: npm install
      working-directory: ./easyfinance.client

  unit-tests:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
    
    - name: Cache node_modules
      id: cache-node-modules-unit
      uses: actions/cache@v6
      with:
        path: ./easyfinance.client/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('./easyfinance.client/package-lock.json') }}

    - name: Install dependencies
      if: steps.cache-node-modules-unit.outputs.cache-hit != 'true'
      run: npm install
      working-directory: ./easyfinance.client

    - name: Download backend build outputs
      uses: actions/download-artifact@v8
      with:
        name: backend-build-debug
        path: .

    - name: Run .Net tests
      run: |
        dotnet test EasyFinance.Domain.Tests/EasyFinance.Domain.Tests.csproj --configuration Debug --no-build --no-restore --verbosity normal --logger trx --collect:"XPlat Code Coverage"
        dotnet test EasyFinance.Application.Tests/EasyFinance.Application.Tests.csproj --configuration Debug --no-build --no-restore --verbosity normal --logger trx --collect:"XPlat Code Coverage"
        dotnet test EasyFinance.Server.Tests/EasyFinance.Server.Tests.csproj --configuration Debug --no-build --no-restore --verbosity normal --logger trx --collect:"XPlat Code Coverage"

    - name: Check code coverage threshold
      if: always()
      shell: bash
      run: |
        COVERAGE_FILE=$(find . -name "coverage.cobertura.xml" -type f | head -1)
        if [ -z "$COVERAGE_FILE" ]; then
          echo "::warning::No coverage.cobertura.xml file found — skipping threshold check"
          exit 0
        fi
        LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' "$COVERAGE_FILE" | head -1)
        COVERAGE=$(echo "$LINE_RATE * 100 / 1" | bc)
        THRESHOLD=80
        if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
          echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        fi
        echo "::notice::Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results
        path: ${{ github.workspace }}/**/TestResults/**/*
        retention-days: 5

    - name: Publish Test Summary
      uses: dorny/test-reporter@v3
      continue-on-error: true
      if: always()
      with:
        name: Test Results
        path: "${{ github.workspace }}/**/*.trx"
        reporter: dotnet-trx
        fail-on-error: false

    - name: Run Angular tests
      id: angular
      run: npm test -- --watch=false --browsers=ChromeHeadlessCI
      working-directory: ./easyfinance.client

    - name: Run Angular lint
      if: always()
      run: npm run lint
      working-directory: ./easyfinance.client

    - name: Run npm audit
      if: always()
      continue-on-error: true
      run: npm audit --audit-level=high
      working-directory: ./easyfinance.client

  mobile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v7

    - name: Detect mobile changes in PR
      id: mobile-changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          mobile:
            - 'econoflow-mobile/src/**'
            - 'econoflow-mobile/App.tsx'
            - 'econoflow-mobile/package.json'
            - 'econoflow-mobile/tsconfig.json'
            - 'econoflow-mobile/.eslintrc.js'

    - name: Install Node.js
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'

    - name: Cache mobile node_modules
      if: steps.mobile-changes.outputs.mobile == 'true'
      uses: actions/cache@v6
      with:
        path: ./econoflow-mobile/node_modules
        key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('./econoflow-mobile/package-lock.json') }}

    - name: Install mobile dependencies
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npm ci
      working-directory: ./econoflow-mobile

    - name: TypeScript check
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npm run typecheck
      working-directory: ./econoflow-mobile

    - name: Lint
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npm run lint
      working-directory: ./econoflow-mobile

    - name: Run mobile unit tests
      if: steps.mobile-changes.outputs.mobile == 'true'
      run: npm test
      working-directory: ./econoflow-mobile

  integration-tests:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
    
    - name: Cache node_modules
      id: cache-node-modules-integration
      uses: actions/cache@v6
      with:
        path: ./easyfinance.client/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('./easyfinance.client/package-lock.json') }}

    - name: Cache Cypress binary
      uses: actions/cache@v6
      with:
        path: ~/.cache/Cypress
        key: cypress-${{ runner.os }}-${{ hashFiles('./easyfinance.client/package-lock.json') }}

    - name: Install dependencies
      if: steps.cache-node-modules-integration.outputs.cache-hit != 'true'
      run: npm install
      working-directory: ./easyfinance.client

    - name: Download backend build outputs
      uses: actions/download-artifact@v8
      with:
        name: backend-build-debug
        path: .

    - name: Restore apphost execute permission
      shell: bash
      run: |
        find ./EasyFinance.Server/bin/Debug -type f -name EasyFinance.Server -exec chmod +x {} \;

    - name: Generate dev certificate
      run: dotnet dev-certs https

    - name: Start application
      id: dotnet
      run: dotnet run --project ./EasyFinance.Server --configuration Debug --no-build --no-restore -p:IncludeSpaProject=true --urls https://localhost:7003/ &
      env:
        EconoFlow_SECRET_KEY_FOR_DELETE_TOKEN: ci-integration-test-placeholder-secret-key-32chars

    - name: Wait for servers to be ready
      run: |
        timeout 300 bash -c 'until curl -sf http://localhost:4200 > /dev/null 2>&1; do sleep 3; done'
      shell: bash

    - name: Run Cypress tests
      id: cypress
      run: npx cypress run
      working-directory: ./easyfinance.client

    - name: Archive Cypress errors
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-screenshots
        path: ./easyfinance.client/cypress/screenshots
        retention-days: 5
