<div class="dialog-header">
  <h2>
    {{ title | translate }}
    @if (titleSuffix) {
      <span class="project-suffix"> - {{ titleSuffix }}</span>
    }
  </h2>
  @if (hasClose){
  <button mat-icon-button (click)="close(false)" class="float-end" aria-label="Close" type="button">
    <mat-icon>close</mat-icon>
  </button>
  }
</div>
<mat-dialog-content>
  @if (component) {
    <ng-container *ngComponentOutlet="component; inputs: componentInputs"></ng-container>
  } @else {
    <router-outlet name="modal"></router-outlet>
  }
</mat-dialog-content>
