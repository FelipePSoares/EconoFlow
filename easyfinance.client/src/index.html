<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EconoFlow - Open-source personal finance management</title>
  <meta name="description" content="Track expenses, plan budgets, collaborate on projects, and protect your account with two-factor authentication.">
  <meta name="keywords" content="personal finance, budgeting app, expense tracker, financial planning, open source finance">
  <meta name="csp-nonce" content="{{nonce}}">
  <base href="/">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f76a8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style nonce="{{nonce}}">
    html,
    body {
      background-color: #f5f8fc;
    }

    html[data-theme='dark'],
    html[data-theme='dark'] body {
      background-color: #0f1724;
    }
  </style>
  <script nonce="{{nonce}}">
    (function () {
      const storageKey = 'theme-mode';
      const darkThemeColor = '#0f1724';
      const lightThemeColor = '#0f76a8';
      const darkManifestHref = '/manifest.dark.webmanifest';
      const lightManifestHref = '/manifest.webmanifest';

      let storedTheme = null;
      try {
        storedTheme = window.localStorage.getItem(storageKey);
      } catch {
        storedTheme = null;
      }

      const prefersDark = typeof window.matchMedia === 'function'
        && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const resolvedTheme = storedTheme === 'dark' || storedTheme === 'light'
        ? storedTheme
        : (prefersDark ? 'dark' : 'light');

      const isDarkTheme = resolvedTheme === 'dark';
      const root = document.documentElement;
      root.setAttribute('data-theme', resolvedTheme);

      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', isDarkTheme ? darkThemeColor : lightThemeColor);
      }

      const appleStatusBarMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (appleStatusBarMeta) {
        appleStatusBarMeta.setAttribute('content', isDarkTheme ? 'black-translucent' : 'default');
      }

      const manifestLink = document.querySelector('link[rel="manifest"]');
      if (manifestLink) {
        manifestLink.setAttribute('href', isDarkTheme ? darkManifestHref : lightManifestHref);
      }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="EconoFlow - Open-source personal finance management" />
  <meta property="og:description" content="Track expenses, plan budgets, collaborate on projects, and protect your account with two-factor authentication." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://econoflow.pt/" />
  <meta property="og:image" content="https://econoflow.pt/assets/images/Logo-without-text-1200.jpg" />
  <meta property="og:image:type" content="image/jpeg" />

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="econoflow.pt">
  <meta property="twitter:url" content="https://econoflow.pt">
  <meta name="twitter:title" content="EconoFlow - Open-source personal finance management">
  <meta name="twitter:description" content="Track expenses, plan budgets, collaborate on projects, and protect your account with two-factor authentication.">
  <meta name="twitter:image" content="https://econoflow.pt/assets/images/Logo-without-text-1200.jpg">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/Logo-without-text-background-180-min.png" type="image/png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192x192.png" type="image/png">
  <link rel="alternate" type="text/plain" title="LLMs" href="/llms.txt">
</head>
<body class="mat-typography">
  <app-root ngCspNonce="{{nonce}}"></app-root>
</body>
</html>
